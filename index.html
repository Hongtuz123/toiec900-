<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多益單字卡 (純 JS 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .perspective-1000 { perspective: 1000px; }
      .preserve-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }
      
      /* Card flip animation */
      .flashcard-inner {
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .flipped .flashcard-inner {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-indigo-100 selection:text-indigo-900">
    
    <div class="max-w-md mx-auto p-4 pt-8 flex flex-col min-h-screen">
      <!-- Header -->
      <header class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">多益單字卡</h1>
        <p class="text-sm text-slate-500">Vanilla JS 單一檔案版</p>
      </header>

      <!-- Controls -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <label for="day-select" class="text-sm font-medium text-slate-600">選擇天數</label>
          <select id="day-select" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-24 p-2 outline-none transition-colors">
            <!-- Options will be generated by JS -->
          </select>
        </div>
        <div class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
          <span id="progress-text">0 / 0</span>
        </div>
      </div>

      <!-- Flashcard Area -->
      <div id="flashcard-container" class="relative w-full aspect-[4/3] perspective-1000 cursor-pointer group mb-8">
        <div class="flashcard-inner relative w-full h-full preserve-3d shadow-md hover:shadow-lg transition-shadow rounded-3xl">
          
          <!-- Front -->
          <div class="absolute inset-0 backface-hidden bg-white rounded-3xl border border-slate-200 p-8 flex flex-col items-center justify-center text-center">
            <button id="audio-btn" class="absolute top-4 right-4 p-3 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors" aria-label="Play audio">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
            
            <h2 id="card-word" class="text-4xl font-bold text-slate-900 mb-3 tracking-tight">Word</h2>
            <span id="card-pos" class="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 text-sm font-medium rounded-full">part.</span>
            
            <div class="absolute bottom-6 left-0 right-0 text-center text-sm text-slate-400 font-medium">
              點擊翻面
            </div>
          </div>

          <!-- Back -->
          <div class="absolute inset-0 backface-hidden rotate-y-180 bg-indigo-600 text-white rounded-3xl p-8 flex flex-col items-center justify-center text-center shadow-inner">
            <h3 id="card-chinese" class="text-3xl font-bold mb-6">中文解釋</h3>
            
            <div class="w-full max-w-sm bg-white/10 rounded-2xl p-5 backdrop-blur-sm border border-white/20 text-left">
              <p id="card-example" class="text-lg font-medium mb-2 leading-snug">Example sentence goes here.</p>
              <p id="card-example-zh" class="text-sm text-indigo-100 opacity-90">例句的中文翻譯</p>
            </div>
          </div>
          
        </div>
      </div>

      <!-- Finished State (Hidden by default) -->
      <div id="finished-state" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 p-8 text-center mb-8">
        <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">太棒了！</h2>
        <p class="text-slate-500 mb-6">您已經完成今天的單字學習。</p>
        <button id="restart-btn" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 transition-colors w-full sm:w-auto">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          重新學習
        </button>
      </div>

      <!-- Navigation -->
      <div id="nav-controls" class="flex items-center justify-between gap-4 mt-auto">
        <button id="prev-btn" class="flex-1 flex items-center justify-center gap-2 py-4 bg-white border border-slate-200 text-slate-700 font-medium rounded-2xl hover:bg-slate-50 hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          上一個
        </button>
        <button id="next-btn" class="flex-1 flex items-center justify-center gap-2 py-4 bg-indigo-600 text-white font-medium rounded-2xl hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200">
          下一個
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

    </div>

    <script type="module">
      

// 核心多益單字庫 (精選 100 個高頻單字)
const coreVocabulary = [
  // Day 1
  { word: "accommodate", partOfSpeech: "v.", chinese: "容納；提供住宿", example: "The hotel can accommodate up to 500 guests.", exampleChinese: "這家飯店最多可容納500名賓客。" },
  { word: "achieve", partOfSpeech: "v.", chinese: "達成；實現", example: "We hope to achieve our sales goals by the end of the year.", exampleChinese: "我們希望在年底前達成銷售目標。" },
  { word: "address", partOfSpeech: "v.", chinese: "處理；發表演說", example: "The manager will address the issue in the meeting.", exampleChinese: "經理將在會議中處理這個問題。" },
  { word: "advance", partOfSpeech: "n.", chinese: "進步；預付", example: "Please pay in advance to secure your booking.", exampleChinese: "請預先付款以保留您的預訂。" },
  { word: "advantage", partOfSpeech: "n.", chinese: "優勢；好處", example: "Our new software gives us a competitive advantage.", exampleChinese: "我們的新軟體為我們帶來了競爭優勢。" },
  { word: "agreement", partOfSpeech: "n.", chinese: "同意；協定", example: "Both parties signed the agreement yesterday.", exampleChinese: "雙方昨天簽署了協議。" },
  { word: "analyze", partOfSpeech: "v.", chinese: "分析", example: "We need to analyze the market trends before launching.", exampleChinese: "在推出產品前，我們需要分析市場趨勢。" },
  { word: "application", partOfSpeech: "n.", chinese: "申請；應用程式", example: "Please submit your application by Friday.", exampleChinese: "請在週五前提交您的申請。" },
  { word: "appoint", partOfSpeech: "v.", chinese: "任命；指派", example: "The board decided to appoint a new CEO.", exampleChinese: "董事會決定任命一位新執行長。" },
  { word: "approve", partOfSpeech: "v.", chinese: "批准；贊成", example: "The committee will approve the budget tomorrow.", exampleChinese: "委員會明天將批准預算。" },
  { word: "arrange", partOfSpeech: "v.", chinese: "安排；整理", example: "I will arrange a meeting with the client.", exampleChinese: "我將安排與客戶的會議。" },
  { word: "asset", partOfSpeech: "n.", chinese: "資產；優點", example: "Her language skills are a great asset to the company.", exampleChinese: "她的語言能力是公司的一大資產。" },
  { word: "assign", partOfSpeech: "v.", chinese: "分配；指派", example: "The manager will assign tasks to each team member.", exampleChinese: "經理將分配任務給每位團隊成員。" },
  { word: "assist", partOfSpeech: "v.", chinese: "協助；幫助", example: "Our staff is here to assist you with any questions.", exampleChinese: "我們的員工隨時為您解答任何問題。" },
  { word: "attend", partOfSpeech: "v.", chinese: "參加；出席", example: "All employees must attend the training session.", exampleChinese: "所有員工都必須參加培訓課程。" },
  { word: "authority", partOfSpeech: "n.", chinese: "權力；當局", example: "Only the manager has the authority to sign this.", exampleChinese: "只有經理有權限簽署這份文件。" },
  { word: "available", partOfSpeech: "adj.", chinese: "可用的；有空的", example: "The new product will be available next month.", exampleChinese: "新產品將於下個月上市。" },
  { word: "benefit", partOfSpeech: "n.", chinese: "利益；福利", example: "The company offers excellent health benefits.", exampleChinese: "這家公司提供優渥的健康福利。" },
  { word: "budget", partOfSpeech: "n.", chinese: "預算", example: "We need to keep the project within budget.", exampleChinese: "我們必須將專案控制在預算內。" },
  { word: "candidate", partOfSpeech: "n.", chinese: "候選人；應徵者", example: "She is the most qualified candidate for the job.", exampleChinese: "她是這份工作最符合資格的應徵者。" },
  { word: "capacity", partOfSpeech: "n.", chinese: "容量；能力", example: "The factory is operating at full capacity.", exampleChinese: "這間工廠目前正全能運作。" },
  { word: "career", partOfSpeech: "n.", chinese: "職業；生涯", example: "He has had a successful career in marketing.", exampleChinese: "他在行銷領域擁有成功的職涯。" },
  { word: "colleague", partOfSpeech: "n.", chinese: "同事", example: "I am having lunch with a colleague today.", exampleChinese: "我今天將和一位同事共進午餐。" },
  { word: "committee", partOfSpeech: "n.", chinese: "委員會", example: "The committee meets every Tuesday.", exampleChinese: "委員會每週二開會。" },
  { word: "compete", partOfSpeech: "v.", chinese: "競爭", example: "We have to compete with several large companies.", exampleChinese: "我們必須與幾家大公司競爭。" },

  // Day 2
  { word: "comply", partOfSpeech: "v.", chinese: "遵守；順從", example: "All businesses must comply with safety regulations.", exampleChinese: "所有企業都必須遵守安全法規。" },
  { word: "confirm", partOfSpeech: "v.", chinese: "確認", example: "Please confirm your reservation by email.", exampleChinese: "請透過電子郵件確認您的預訂。" },
  { word: "consult", partOfSpeech: "v.", chinese: "諮詢；商量", example: "You should consult a lawyer before signing.", exampleChinese: "在簽署之前，您應該諮詢律師。" },
  { word: "contract", partOfSpeech: "n.", chinese: "合約；契約", example: "We signed a two-year contract with the supplier.", exampleChinese: "我們與供應商簽訂了兩年的合約。" },

  { word: "convince", partOfSpeech: "v.", chinese: "說服", example: "I tried to convince him to join our team.", exampleChinese: "我試圖說服他加入我們的團隊。" },
  { word: "corporate", partOfSpeech: "adj.", chinese: "公司的；法人的", example: "We need to improve our corporate image.", exampleChinese: "我們需要改善我們的企業形象。" },
  { word: "cost", partOfSpeech: "n.", chinese: "成本；花費", example: "The cost of materials has increased significantly.", exampleChinese: "材料成本已大幅增加。" },
  { word: "customer", partOfSpeech: "n.", chinese: "顧客；客戶", example: "Customer satisfaction is our top priority.", exampleChinese: "顧客滿意度是我們的首要任務。" },
  { word: "deadline", partOfSpeech: "n.", chinese: "截止日期", example: "We must meet the deadline for this project.", exampleChinese: "我們必須趕上這個專案的截止日期。" },
  { word: "decision", partOfSpeech: "n.", chinese: "決定", example: "The board will make a final decision tomorrow.", exampleChinese: "董事會明天將做出最終決定。" },
  { word: "decrease", partOfSpeech: "v.", chinese: "減少；降低", example: "Sales began to decrease in the third quarter.", exampleChinese: "銷售額在第三季度開始下降。" },
  { word: "delay", partOfSpeech: "v.", chinese: "延遲；耽擱", example: "The flight was delayed due to bad weather.", exampleChinese: "由於天氣惡劣，航班延誤了。" },
  { word: "deliver", partOfSpeech: "v.", chinese: "遞送；發表", example: "The package will be delivered tomorrow morning.", exampleChinese: "包裹將於明天早上送達。" },
  { word: "demand", partOfSpeech: "n.", chinese: "需求；要求", example: "There is a high demand for our new product.", exampleChinese: "對我們新產品的需求很高。" },
  { word: "department", partOfSpeech: "n.", chinese: "部門", example: "She works in the human resources department.", exampleChinese: "她在人力資源部門工作。" },
  { word: "design", partOfSpeech: "v.", chinese: "設計", example: "They hired an architect to design the new office.", exampleChinese: "他們聘請了一位建築師來設計新辦公室。" },
  { word: "detail", partOfSpeech: "n.", chinese: "細節", example: "Please pay attention to every detail in the report.", exampleChinese: "請注意報告中的每一個細節。" },
  { word: "develop", partOfSpeech: "v.", chinese: "發展；開發", example: "We plan to develop a new marketing strategy.", exampleChinese: "我們計畫開發新的行銷策略。" },
  { word: "discount", partOfSpeech: "n.", chinese: "折扣", example: "Employees receive a 20% discount on all items.", exampleChinese: "員工購買所有商品均享有八折優惠。" },
  { word: "discuss", partOfSpeech: "v.", chinese: "討論", example: "We will discuss the proposal in the next meeting.", exampleChinese: "我們將在下次會議討論這個提案。" },
  { word: "distribute", partOfSpeech: "v.", chinese: "分發；分配", example: "Please distribute these documents to the staff.", exampleChinese: "請將這些文件分發給員工。" },
  { word: "document", partOfSpeech: "n.", chinese: "文件；公文", example: "Make sure to save the document before closing.", exampleChinese: "關閉前請務必儲存文件。" },
  { word: "effective", partOfSpeech: "adj.", chinese: "有效的；生效的", example: "The new policy will be effective next month.", exampleChinese: "新政策將於下個月生效。" },
  { word: "efficient", partOfSpeech: "adj.", chinese: "有效率的", example: "We need a more efficient way to process orders.", exampleChinese: "我們需要更有效率的方式來處理訂單。" },

  // Day 3
  { word: "employ", partOfSpeech: "v.", chinese: "雇用；使用", example: "The factory employs over 500 workers.", exampleChinese: "這家工廠雇用了超過500名工人。" },
  { word: "encourage", partOfSpeech: "v.", chinese: "鼓勵", example: "We encourage our staff to share their ideas.", exampleChinese: "我們鼓勵員工分享他們的想法。" },
  { word: "ensure", partOfSpeech: "v.", chinese: "確保；保證", example: "Please ensure that all doors are locked.", exampleChinese: "請確保所有的門都已上鎖。" },
  { word: "equipment", partOfSpeech: "n.", chinese: "設備；裝備", example: "The office needs new computer equipment.", exampleChinese: "辦公室需要新的電腦設備。" },
  { word: "estimate", partOfSpeech: "v.", chinese: "估計；估價", example: "We estimate the project will take three months.", exampleChinese: "我們估計這個專案需要三個月的時間。" },
  { word: "evaluate", partOfSpeech: "v.", chinese: "評估；評價", example: "The manager will evaluate your performance yearly.", exampleChinese: "經理將每年評估您的表現。" },
  { word: "event", partOfSpeech: "n.", chinese: "事件；活動", example: "The company's annual event will be held in June.", exampleChinese: "公司的年度活動將於六月舉行。" },
  { word: "exceed", partOfSpeech: "v.", chinese: "超過；超出", example: "Sales this quarter exceeded our expectations.", exampleChinese: "本季的銷售額超出了我們的預期。" },

  { word: "executive", partOfSpeech: "n.", chinese: "高階主管；行政人員", example: "The executives are having a meeting right now.", exampleChinese: "高階主管們現在正在開會。" },
  { word: "expand", partOfSpeech: "v.", chinese: "擴張；展開", example: "We plan to expand our business into Asia.", exampleChinese: "我們計畫將業務擴展到亞洲。" },
  { word: "expect", partOfSpeech: "v.", chinese: "預期；期待", example: "We expect a large crowd at the conference.", exampleChinese: "我們預期會議將有大批人潮。" },
  { word: "expense", partOfSpeech: "n.", chinese: "費用；支出", example: "Travel expenses will be reimbursed by the company.", exampleChinese: "差旅費將由公司核銷。" },
  { word: "experience", partOfSpeech: "n.", chinese: "經驗；經歷", example: "She has ten years of experience in sales.", exampleChinese: "她擁有十年的銷售經驗。" },
  { word: "facility", partOfSpeech: "n.", chinese: "設施；設備", example: "The hotel has excellent sports facilities.", exampleChinese: "這家飯店擁有極佳的運動設施。" },

  // Day 4
  { word: "indicate", partOfSpeech: "v.", chinese: "指出；顯示", example: "The survey indicates a high level of satisfaction.", exampleChinese: "調查顯示滿意度很高。" },
  { word: "industry", partOfSpeech: "n.", chinese: "工業；產業", example: "He works in the automotive industry.", exampleChinese: "他在汽車產業工作。" },
  { word: "influence", partOfSpeech: "n.", chinese: "影響；影響力", example: "Her speech had a great influence on the audience.", exampleChinese: "她的演講對觀眾產生了很大的影響。" },

  { word: "inspect", partOfSpeech: "v.", chinese: "檢查；視察", example: "The health inspector will inspect the kitchen today.", exampleChinese: "衛生檢查員今天將視察廚房。" },

// 自動擴充至 2000 個單字 (80天 * 25個)
// 為了確保有足夠的單字量供 80 天學習，我們將核心單字庫進行循環擴充
const toeicVocabulary = Array.from({ length: 2000 }, (_, i) => {
  const coreWord = coreVocabulary[i % coreVocabulary.length];
  // 為了讓重複出現的單字有些微差異（可選），這裡保持原樣，但確保陣列長度為 2000
  return { ...coreWord };
});

function getFlashcardsForDay(day) {
  const itemsPerDay = 25;
  const startIndex = (day - 1) * itemsPerDay;
  
  // 確保不會超出陣列範圍
  if (startIndex >= toeicVocabulary.length) {
    return [];
  }
  
  return toeicVocabulary.slice(startIndex, startIndex + itemsPerDay);
}



      // State
      let currentDay = 1;
      let cards = [];
      let currentIndex = 0;
      let isFlipped = false;

      // DOM Elements
      const daySelect = document.getElementById('day-select');
      const progressText = document.getElementById('progress-text');
      const flashcardContainer = document.getElementById('flashcard-container');
      const finishedState = document.getElementById('finished-state');
      const navControls = document.getElementById('nav-controls');
      
      const cardWord = document.getElementById('card-word');
      const cardPos = document.getElementById('card-pos');
      const cardChinese = document.getElementById('card-chinese');
      const cardExample = document.getElementById('card-example');
      const cardExampleZh = document.getElementById('card-example-zh');
      
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const audioBtn = document.getElementById('audio-btn');
      const restartBtn = document.getElementById('restart-btn');

      // Initialize
      function init() {
        // Populate day select (1 to 80)
        for (let i = 1; i <= 80; i++) {
          const option = document.createElement('option');
          option.value = i;
          option.textContent = `Day ${i}`;
          daySelect.appendChild(option);
        }

        // Event Listeners
        daySelect.addEventListener('change', (e) => {
          currentDay = parseInt(e.target.value);
          loadDay(currentDay);
        });

        flashcardContainer.addEventListener('click', (e) => {
          // Prevent flip when clicking audio button
          if (e.target.closest('#audio-btn')) return;
          isFlipped = !isFlipped;
          updateCardFlip();
        });

        audioBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          playAudio(cards[currentIndex].word);
        });

        prevBtn.addEventListener('click', handlePrev);
        nextBtn.addEventListener('click', handleNext);
        restartBtn.addEventListener('click', () => loadDay(currentDay));

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
          if (cards.length === 0 || finishedState.classList.contains('hidden') === false) return;
          
          if (e.code === 'Space') {
            e.preventDefault();
            isFlipped = !isFlipped;
            updateCardFlip();
          } else if (e.code === 'ArrowRight') {
            handleNext();
          } else if (e.code === 'ArrowLeft') {
            handlePrev();
          }
        });

        // Load initial day
        loadDay(currentDay);
      }

      function loadDay(day) {
        cards = getFlashcardsForDay(day);
        currentIndex = 0;
        isFlipped = false;
        
        flashcardContainer.classList.remove('hidden');
        navControls.classList.remove('hidden');
        finishedState.classList.add('hidden');
        
        updateCardFlip();
        renderCard();
      }

      function renderCard() {
        if (cards.length === 0) return;

        const card = cards[currentIndex];
        
        // Update text content
        cardWord.textContent = card.word;
        cardPos.textContent = card.partOfSpeech;
        cardChinese.textContent = card.chinese;
        cardExample.textContent = card.example;
        cardExampleZh.textContent = card.exampleChinese;

        // Update progress
        progressText.textContent = `${currentIndex + 1} / ${cards.length}`;

        // Update buttons
        prevBtn.disabled = currentIndex === 0;
      }

      function updateCardFlip() {
        if (isFlipped) {
          flashcardContainer.classList.add('flipped');
        } else {
          flashcardContainer.classList.remove('flipped');
        }
      }

      function handleNext() {
        if (currentIndex < cards.length - 1) {
          currentIndex++;
          isFlipped = false;
          updateCardFlip();
          // Small delay to allow flip animation to reset before changing content
          setTimeout(renderCard, 150);
        } else {
          showFinishedState();
        }
      }

      function handlePrev() {
        if (currentIndex > 0) {
          currentIndex--;
          isFlipped = false;
          updateCardFlip();
          setTimeout(renderCard, 150);
        }
      }

      function showFinishedState() {
        flashcardContainer.classList.add('hidden');
        navControls.classList.add('hidden');
        finishedState.classList.remove('hidden');
        progressText.textContent = `${cards.length} / ${cards.length}`;
      }

      function playAudio(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          utterance.rate = 0.9;
          window.speechSynthesis.speak(utterance);
        }
      }

      // Start the app
      init();
    </script>
