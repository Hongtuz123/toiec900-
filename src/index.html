<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多益單字卡 (純 JS 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .perspective-1000 { perspective: 1000px; }
      .preserve-3d { transform-style: preserve-3d; }
      .backface-hidden { backface-visibility: hidden; }
      .rotate-y-180 { transform: rotateY(180deg); }
      
      /* Card flip animation */
      .flashcard-inner {
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .flipped .flashcard-inner {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-indigo-100 selection:text-indigo-900">
    
    <div class="max-w-md mx-auto p-4 pt-8 flex flex-col min-h-screen">
      <!-- Header -->
      <header class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">多益單字卡</h1>
        <p class="text-sm text-slate-500">Vanilla JS 單一檔案版</p>
      </header>

      <!-- Controls -->
      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <label for="day-select" class="text-sm font-medium text-slate-600">選擇天數</label>
          <select id="day-select" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-24 p-2 outline-none transition-colors">
            <!-- Options will be generated by JS -->
          </select>
        </div>
        <div class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
          <span id="progress-text">0 / 0</span>
        </div>
      </div>

      <!-- Flashcard Area -->
      <div id="flashcard-container" class="relative w-full aspect-[4/3] perspective-1000 cursor-pointer group mb-8">
        <div class="flashcard-inner relative w-full h-full preserve-3d shadow-md hover:shadow-lg transition-shadow rounded-3xl">
          
          <!-- Front -->
          <div class="absolute inset-0 backface-hidden bg-white rounded-3xl border border-slate-200 p-8 flex flex-col items-center justify-center text-center">
            <button id="audio-btn" class="absolute top-4 right-4 p-3 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-full transition-colors" aria-label="Play audio">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
            
            <h2 id="card-word" class="text-4xl font-bold text-slate-900 mb-3 tracking-tight">Word</h2>
            <span id="card-pos" class="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 text-sm font-medium rounded-full">part.</span>
            
            <div class="absolute bottom-6 left-0 right-0 text-center text-sm text-slate-400 font-medium">
              點擊翻面
            </div>
          </div>

          <!-- Back -->
          <div class="absolute inset-0 backface-hidden rotate-y-180 bg-indigo-600 text-white rounded-3xl p-8 flex flex-col items-center justify-center text-center shadow-inner">
            <h3 id="card-chinese" class="text-3xl font-bold mb-6">中文解釋</h3>
            
            <div class="w-full max-w-sm bg-white/10 rounded-2xl p-5 backdrop-blur-sm border border-white/20 text-left">
              <p id="card-example" class="text-lg font-medium mb-2 leading-snug">Example sentence goes here.</p>
              <p id="card-example-zh" class="text-sm text-indigo-100 opacity-90">例句的中文翻譯</p>
            </div>
          </div>
          
        </div>
      </div>

      <!-- Finished State (Hidden by default) -->
      <div id="finished-state" class="hidden bg-white rounded-3xl shadow-sm border border-slate-200 p-8 text-center mb-8">
        <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">太棒了！</h2>
        <p class="text-slate-500 mb-6">您已經完成今天的單字學習。</p>
        <button id="restart-btn" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-indigo-600 text-white font-medium rounded-xl hover:bg-indigo-700 transition-colors w-full sm:w-auto">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          重新學習
        </button>
      </div>

      <!-- Navigation -->
      <div id="nav-controls" class="flex items-center justify-between gap-4 mt-auto">
        <button id="prev-btn" class="flex-1 flex items-center justify-center gap-2 py-4 bg-white border border-slate-200 text-slate-700 font-medium rounded-2xl hover:bg-slate-50 hover:text-slate-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          上一個
        </button>
        <button id="next-btn" class="flex-1 flex items-center justify-center gap-2 py-4 bg-indigo-600 text-white font-medium rounded-2xl hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-200">
          下一個
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </div>

    </div>

    <script type="module">
      import { getFlashcardsForDay } from '/src/data/vocabulary.ts';

      // State
      let currentDay = 1;
      let cards = [];
      let currentIndex = 0;
      let isFlipped = false;

      // DOM Elements
      const daySelect = document.getElementById('day-select');
      const progressText = document.getElementById('progress-text');
      const flashcardContainer = document.getElementById('flashcard-container');
      const finishedState = document.getElementById('finished-state');
      const navControls = document.getElementById('nav-controls');
      
      const cardWord = document.getElementById('card-word');
      const cardPos = document.getElementById('card-pos');
      const cardChinese = document.getElementById('card-chinese');
      const cardExample = document.getElementById('card-example');
      const cardExampleZh = document.getElementById('card-example-zh');
      
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const audioBtn = document.getElementById('audio-btn');
      const restartBtn = document.getElementById('restart-btn');

      // Initialize
      function init() {
        // Populate day select (1 to 80)
        for (let i = 1; i <= 80; i++) {
          const option = document.createElement('option');
          option.value = i;
          option.textContent = `Day ${i}`;
          daySelect.appendChild(option);
        }

        // Event Listeners
        daySelect.addEventListener('change', (e) => {
          currentDay = parseInt(e.target.value);
          loadDay(currentDay);
        });

        flashcardContainer.addEventListener('click', (e) => {
          // Prevent flip when clicking audio button
          if (e.target.closest('#audio-btn')) return;
          isFlipped = !isFlipped;
          updateCardFlip();
        });

        audioBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          playAudio(cards[currentIndex].word);
        });

        prevBtn.addEventListener('click', handlePrev);
        nextBtn.addEventListener('click', handleNext);
        restartBtn.addEventListener('click', () => loadDay(currentDay));

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
          if (cards.length === 0 || finishedState.classList.contains('hidden') === false) return;
          
          if (e.code === 'Space') {
            e.preventDefault();
            isFlipped = !isFlipped;
            updateCardFlip();
          } else if (e.code === 'ArrowRight') {
            handleNext();
          } else if (e.code === 'ArrowLeft') {
            handlePrev();
          }
        });

        // Load initial day
        loadDay(currentDay);
      }

      function loadDay(day) {
        cards = getFlashcardsForDay(day);
        currentIndex = 0;
        isFlipped = false;
        
        flashcardContainer.classList.remove('hidden');
        navControls.classList.remove('hidden');
        finishedState.classList.add('hidden');
        
        updateCardFlip();
        renderCard();
      }

      function renderCard() {
        if (cards.length === 0) return;

        const card = cards[currentIndex];
        
        // Update text content
        cardWord.textContent = card.word;
        cardPos.textContent = card.partOfSpeech;
        cardChinese.textContent = card.chinese;
        cardExample.textContent = card.example;
        cardExampleZh.textContent = card.exampleChinese;

        // Update progress
        progressText.textContent = `${currentIndex + 1} / ${cards.length}`;

        // Update buttons
        prevBtn.disabled = currentIndex === 0;
      }

      function updateCardFlip() {
        if (isFlipped) {
          flashcardContainer.classList.add('flipped');
        } else {
          flashcardContainer.classList.remove('flipped');
        }
      }

      function handleNext() {
        if (currentIndex < cards.length - 1) {
          currentIndex++;
          isFlipped = false;
          updateCardFlip();
          // Small delay to allow flip animation to reset before changing content
          setTimeout(renderCard, 150);
        } else {
          showFinishedState();
        }
      }

      function handlePrev() {
        if (currentIndex > 0) {
          currentIndex--;
          isFlipped = false;
          updateCardFlip();
          setTimeout(renderCard, 150);
        }
      }

      function showFinishedState() {
        flashcardContainer.classList.add('hidden');
        navControls.classList.add('hidden');
        finishedState.classList.remove('hidden');
        progressText.textContent = `${cards.length} / ${cards.length}`;
      }

      function playAudio(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          utterance.rate = 0.9;
          window.speechSynthesis.speak(utterance);
        }
      }

      // Start the app
      init();
    </script>
  </body>
</html>
